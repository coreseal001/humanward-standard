name: Humanward AI MVP Tests

on:
  push:
    paths:
      - "prototypes/humanward-ai-mvp/**"
  pull_request:
    paths:
      - "prototypes/humanward-ai-mvp/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototypes/humanward-ai-mvp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: pip install pytest
      - run: python -m pytest
      - run: python -m humanward_ai.reviewer_check
